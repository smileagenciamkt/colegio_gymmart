<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#6366f1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="apple-touch-icon" href="app_icon_192_1772288301970.png">
    <title>Gymmart Pro | Sistema de Asistencia</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --primary-dark: #4f46e5;
            --secondary: #f43f5e;
            --secondary-light: #fb7185;
            --success: #10b981;
            --error: #ef4444;
            --warning: #f59e0b;
            --bg-body: #f8fafc;
            /* Glassmorphism Refined */
            --card-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.5);
            --glass-shine: rgba(255, 255, 255, 0.8);

            --text-main: #0f172a;
            --text-muted: #64748b;
            --nav-bg: rgba(255, 255, 255, 0.85);

            --radius-xl: 32px;
            --radius-lg: 24px;
            --radius-md: 16px;

            --shadow-sm: 0 2px 4px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            --shadow-glass: 0 8px 32px 0 rgba(31, 38, 135, 0.08);
            --shadow-glow: 0 0 20px rgba(99, 102, 241, 0.2);
        }

        [data-theme="dark"] {
            --bg-body: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --nav-bg: rgba(15, 23, 42, 0.9);
        }

        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        h1,
        h2,
        h3,
        h4 {
            font-family: 'Outfit', sans-serif;
            color: var(--text-main);
            letter-spacing: -0.02em;
        }

        h2 {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 20px;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-body);
            background:
                radial-gradient(circle at 0% 0%, rgba(99, 102, 241, 0.12) 0%, transparent 45%),
                radial-gradient(circle at 100% 0%, rgba(244, 63, 94, 0.12) 0%, transparent 45%),
                radial-gradient(circle at 50% 100%, rgba(16, 185, 129, 0.08) 0%, transparent 45%),
                #f8fafc;
            background-attachment: fixed;
            height: 100vh;
            color: var(--text-main);
            overflow: hidden;
            user-select: none;
        }

        /* Animated Background Mesh */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.02;
            pointer-events: none;
            z-index: -1;
        }

        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 24px;
            overflow-y: auto;
            padding-bottom: 120px;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.4s ease, visibility 0.4s;
        }

        #login-screen {
            padding-bottom: 24px;
            justify-content: center;
        }

        .screen.active {
            visibility: visible;
            opacity: 1;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-glass);
            padding: 32px;
            margin-bottom: 24px;
            position: relative;
            overflow: hidden;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -150%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg,
                    transparent,
                    rgba(255, 255, 255, 0.1),
                    transparent);
            transform: skewX(-20deg);
            transition: 0.8s ease-in-out;
        }

        .glass-card:hover::before {
            left: 150%;
        }

        /* Auth Card */
        .auth-card {
            margin: auto;
            max-width: 420px;
            width: 100%;
            text-align: center;
            padding: 40px !important;
            animation: fadeInScale 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.9) translateY(20px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .logo-container {
            margin-bottom: 32px;
            position: relative;
            display: inline-block;
        }

        .logo-container::after {
            content: '';
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 50%;
            z-index: -1;
            opacity: 0.2;
            filter: blur(15px);
        }

        .main-logo {
            width: 140px;
            height: 140px;
            object-fit: contain;
            border-radius: 50%;
            background: white;
            padding: 8px;
            box-shadow: var(--shadow-lg);
            border: 4px solid white;
        }


        h1 {
            font-size: 24px;
            margin-bottom: 8px;
            font-weight: 700;
        }

        /* Forms */
        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            margin-bottom: 8px;
            color: var(--text-muted);
        }

        input,
        select {
            width: 100%;
            padding: 16px 20px;
            border-radius: var(--radius-md);
            border: 1px solid rgba(0, 0, 0, 0.08);
            background: rgba(255, 255, 255, 0.9);
            font-family: inherit;
            font-size: 16px;
            font-weight: 500;
            outline: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: var(--text-main);
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.02);
        }

        input:focus {
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15), var(--shadow-sm);
            transform: translateY(-1px);
        }

        .password-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .btn-icon {
            position: absolute;
            right: 12px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            padding: 8px;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
        }


        /* Buttons */
        .btn-primary {
            width: 100%;
            padding: 18px;
            border-radius: var(--radius-md);
            border: none;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.35);
            position: relative;
            overflow: hidden;
        }

        .btn-primary::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg,
                    transparent,
                    rgba(255, 255, 255, 0.2),
                    transparent);
            transition: 0.5s;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.45);
        }

        .btn-primary:hover::after {
            left: 100%;
        }

        .btn-primary:active {
            transform: scale(0.96) translateY(0);
        }

        .btn-secondary {
            background: white;
            color: var(--primary);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .btn-success {
            background: linear-gradient(135deg, var(--success) 0%, #059669 100%);
            color: white;
        }

        .btn-primary:active,
        .btn-success:active {
            transform: scale(0.96);
            box-shadow: var(--shadow-sm);
        }

        .btn-secondary:active {
            background: #f1f5f9;
            transform: scale(0.96);
        }

        /* Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 24px;
            left: 24px;
            right: 24px;
            height: 76px;
            background: var(--nav-bg);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--glass-border);
            z-index: 1000;
            border-radius: 28px;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .nav-item {
            background: none;
            border: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-muted);
            font-size: 11px;
            font-weight: 500;
            gap: 4px;
            transition: all 0.3s ease;
            position: relative;
            padding: 8px 16px;
            border-radius: var(--radius-md);
        }

        .nav-item.active {
            color: var(--primary);
            background: rgba(99, 102, 241, 0.08);
            box-shadow: inset 0 0 10px rgba(99, 102, 241, 0.05);
        }

        .nav-item .icon {
            font-size: 22px;
            transition: transform 0.3s ease;
        }

        .nav-item.active .icon {
            transform: scale(1.1) translateY(-2px);
        }

        /* Stats Cards (KPIs) */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            padding: 20px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 120px;
        }

        .stat-card.primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.25);
        }

        .stat-card.secondary {
            background: linear-gradient(135deg, var(--secondary) 0%, var(--secondary-light) 100%);
            color: white;
            box-shadow: 0 8px 20px rgba(244, 63, 94, 0.25);
        }

        .stat-label {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.9;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            margin-top: 8px;
        }

        .stat-icon {
            position: absolute;
            right: -10px;
            bottom: -10px;
            font-size: 64px;
            opacity: 0.2;
            transform: rotate(-15deg);
        }

        /* Students List */
        .students-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .student-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            background: white;
            border-radius: var(--radius-md);
            border: 1px solid rgba(0, 0, 0, 0.04);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .student-row:hover {
            transform: scale(1.02);
            box-shadow: var(--shadow-md);
            border-color: var(--primary-light);
        }

        .student-info {
            flex: 1;
            cursor: pointer;
        }

        .student-name {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 2px;
        }

        .student-docs {
            font-size: 11px;
            font-weight: 500;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .attendance-btns {
            display: flex;
            gap: 10px;
            background: rgba(0, 0, 0, 0.03);
            padding: 4px;
            border-radius: 30px;
        }

        .btn-att {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 800;
            background: transparent;
            color: var(--text-muted);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .btn-att.present.active {
            background: var(--success);
            color: white;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
            transform: scale(1.1);
        }

        .btn-att.absent.active {
            background: var(--error);
            color: white;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
            transform: scale(1.1);
        }

        .btn-att.justified.active {
            background: var(--warning);
            color: white;
            box-shadow: 0 4px 12px rgba(245, 158, 11, 0.3);
            transform: scale(1.1);
        }

        /* Loader */
        .loader {
            width: 48px;
            height: 48px;
            border: 5px solid #FFF;
            border-bottom-color: var(--primary);
            border-radius: 50%;
            display: inline-block;
            box-sizing: border-box;
            animation: rotation 1s linear infinite;
            margin: auto;
        }

        @keyframes rotation {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .hidden {
            display: none;
        }

        /* Modales Premium */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal-overlay:not(.hidden) {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            width: 100%;
            max-width: 440px;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            gap: 20px;
            transform: scale(0.95);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            background: var(--card-bg);
            padding: 30px;
        }

        .modal-overlay:not(.hidden) .modal-content {
            transform: scale(1);
        }

        .modal-scroll {
            overflow-y: auto;
            padding-right: 5px;
        }

        .stat-summary {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }

        .mini-card {
            background: white;
            padding: 12px 8px;
            border-radius: var(--radius-md);
            text-align: center;
            border: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: var(--shadow-sm);
        }

        .mini-card .label {
            display: block;
            font-size: 10px;
            text-transform: uppercase;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .mini-card .value {
            font-size: 18px;
            font-weight: 800;
            color: var(--text-main);
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: var(--radius-md);
            margin-bottom: 8px;
            border: 1px solid rgba(0, 0, 0, 0.03);
            font-size: 14px;
        }

        .history-item span {
            color: var(--text-muted);
            font-weight: 500;
        }

        .status-p {
            color: var(--success);
            font-weight: 700;
        }

        .status-a {
            color: var(--error);
            font-weight: 700;
        }

        .status-j {
            color: var(--warning);
            font-weight: 700;
        }

        /* Settings and Import refinements */
        .user-info {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 8px 0;
        }

        .user-avatar {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: var(--shadow-md);
            color: white;
        }

        .import-card {
            text-align: center;
            padding: 40px 24px;
            border: 2px dashed var(--glass-border);
            background: rgba(255, 255, 255, 0.4);
        }

        .import-icon {
            font-size: 48px;
            margin-bottom: 16px;
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.1));
        }

        .selection-bar {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 16px;
            margin-bottom: 24px;
        }

        @media (min-width: 600px) {
            .selection-bar {
                flex-direction: row;
                align-items: center;
            }
        }

        /* History List items */
        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            background: rgba(0, 0, 0, 0.02);
            border-radius: var(--radius-md);
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
        }

        .history-item b {
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            text-transform: uppercase;
        }

        .status-p {
            color: var(--success);
            background: rgba(16, 185, 129, 0.1);
        }

        .status-a {
            color: var(--error);
            background: rgba(239, 68, 68, 0.1);
        }

        .status-j {
            color: var(--warning);
            background: rgba(245, 158, 11, 0.1);
        }

        /* Dashboard Tags & Lists */
        .quick-stats-tags {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .stat-tag {
            padding: 10px 18px;
            border-radius: 30px;
            background: white;
            border: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: var(--shadow-sm);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-main);
        }

        .stat-tag:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-md);
            border-color: var(--primary);
        }

        .stat-tag.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .stat-tag .count {
            background: rgba(0, 0, 0, 0.08);
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 12px;
        }

        .stat-tag.active .count {
            background: rgba(255, 255, 255, 0.2);
        }

        .student-list-container {
            margin-top: 16px;
            animation: slideDown 0.4s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .dashboard-student-row {
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.7);
            border-radius: var(--radius-md);
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(0, 0, 0, 0.03);
            transition: all 0.2s;
        }

        .dashboard-student-row:hover {
            background: white;
            box-shadow: var(--shadow-sm);
            border-color: var(--primary);
        }

        .dashboard-student-row .course-badge {
            font-size: 10px;
            font-weight: 700;
            padding: 4px 10px;
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary);
            border-radius: 20px;
            text-transform: uppercase;
        }

        .btn-close {
            background: rgba(0, 0, 0, 0.05);
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-size: 1.2rem;
            color: var(--text-main);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .btn-close:hover {
            background: var(--error);
            color: white;
            transform: rotate(90deg);
        }

        .save-action-bar {
            position: fixed;
            bottom: 120px;
            left: 24px;
            right: 24px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.9);
            padding: 16px;
            border-radius: 20px;
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .hidden {
            display: none !important;
        }
    </style>

    <!-- Modal de Reporte por Alumno -->
    <div id="student-modal" class="modal-overlay hidden">
        <div class="glass-card modal-content">
            <header>
                <h2 id="modal-student-name">Reporte de Alumno</h2>
                <button class="btn-close" onclick="closeModal()">✕</button>
            </header>
            <div id="modal-body" class="modal-scroll">
                <div class="stat-summary">
                    <div class="mini-card">
                        <span class="label">Presentes</span>
                        <span class="value" id="modal-stat-p">0</span>
                    </div>
                    <div class="mini-card">
                        <span class="label">Ausentes</span>
                        <span class="value" id="modal-stat-a">0</span>
                    </div>
                    <div class="mini-card">
                        <span class="label">Justificados</span>
                        <span class="value" id="modal-stat-j">0</span>
                    </div>
                </div>
                <div id="modal-history-list">
                    <!-- Historial aquí -->
                </div>

                <!-- Sección Administrativa (Trasladar Alumno) -->
                <div style="margin-top: 24px; padding-top: 16px; border-top: 1px solid rgba(0,0,0,0.1);">
                    <h3 style="font-size: 16px; margin-bottom: 12px; color: var(--text-main);">Administración</h3>
                    <div class="input-group" style="margin-bottom: 12px;">
                        <label style="display:block; margin-bottom: 4px; font-weight: 600; font-size: 14px;">Trasladar a
                            otro curso:</label>
                        <select id="transfer-course-select"
                            style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid rgba(0,0,0,0.1); background: rgba(0,0,0,0.02); font-family: 'Outfit';">
                            <!-- Opciones cargadas dinámicamente -->
                        </select>
                    </div>
                    <button id="btn-transfer-student" class="btn-primary"
                        style="width: 100%; background: linear-gradient(135deg, #f59e0b, #d97706); box-shadow: 0 4px 12px rgba(245, 158, 11, 0.3);">
                        🔄 Trasladar Alumno
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal de Añadir Alumno -->
    <div id="add-student-modal" class="modal-overlay hidden">
        <div class="glass-card modal-content" style="max-width: 400px;">
            <header>
                <h2>Añadir Alumno</h2>
                <button class="btn-close" onclick="closeAddStudentModal()">✕</button>
            </header>
            <div class="modal-body" style="padding: 16px;">
                <form id="add-student-form" onsubmit="window.handleAddStudent(event)">
                    <div class="input-group" style="margin-bottom: 12px;">
                        <label style="display:block; margin-bottom: 4px; font-weight: 600; font-size: 14px;">Curso
                            *</label>
                        <select id="new-student-course" required
                            style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid rgba(0,0,0,0.1); background: rgba(0,0,0,0.02); font-family: 'Outfit';">
                        </select>
                    </div>
                    <div class="input-group" style="margin-bottom: 12px;">
                        <label style="display:block; margin-bottom: 4px; font-weight: 600; font-size: 14px;">Nombre
                            *</label>
                        <input type="text" id="new-student-name" required
                            style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid rgba(0,0,0,0.1); background: rgba(0,0,0,0.02); font-family: 'Outfit';">
                    </div>
                    <div class="input-group" style="margin-bottom: 12px;">
                        <label
                            style="display:block; margin-bottom: 4px; font-weight: 600; font-size: 14px;">Apellido</label>
                        <input type="text" id="new-student-last" placeholder="(Opcional)"
                            style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid rgba(0,0,0,0.1); background: rgba(0,0,0,0.02); font-family: 'Outfit';">
                    </div>
                    <div class="input-group" style="margin-bottom: 20px;">
                        <label style="display:block; margin-bottom: 4px; font-weight: 600; font-size: 14px;">Documento
                            (C.I.)</label>
                        <input type="text" id="new-student-doc" placeholder="(Opcional)"
                            style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid rgba(0,0,0,0.1); background: rgba(0,0,0,0.02); font-family: 'Outfit';">
                    </div>
                    <button type="submit" class="btn-primary" style="width: 100%;">Guardar Alumno</button>

        // --- NAVEGACIÓN ---

                if (screens.content) {

        // --- MANEJO DE LOGIN ---
        window.handleLoginSubmit = async function (e) {
            if (e) e.preventDefault();

            const btn = e.target.querySelector('button[type="submit"]');
            if (!btn) return;
            const originalText = btn.textContent;

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const client = getSupabase();

            if (!client) {
                alert('⏳ Error de conexión: Revisa tu internet.');
                return;
            }

            btn.textContent = '⌛ Entrando...';
            btn.disabled = true;

            try {
                const { data, error } = await client.auth.signInWithPassword({ email, password });

                btn.textContent = originalText;
                btn.disabled = false;

                if (error) {
                    alert('❌ Error: ' + error.message);
                }
                if (data.user) {
                    state.user = data.user;
                    showScreen('main');
                    navigateTo('dashboard');
                }
            } catch (err) {
                console.error(err);
                btn.textContent = originalText;
                btn.disabled = false;
                alert('🚨 Error: Credenciales incorrectas o problema de red.');
            }
        };

        async function checkSession() {
            const client = getSupabase();
            if (!client) return;

            const { data: { session }, error } = await client.auth.getSession();
            if (error) console.error('Error verificando sesión:', error);

            if (session && session.user) {
                console.log('Sesión recuperada:', session.user.email);
                state.user = session.user;
                showScreen('main');
                navigateTo('dashboard');
            } else {
                showScreen('login');
            }

            // Escuchar cambios de estado (Login/Logout)
            client.auth.onAuthStateChange((event, session) => {
                console.log('Cambio Auth:', event);
                if (event === 'SIGNED_IN' && session) {
                    state.user = session.user;
                    showScreen('main');
                } else if (event === 'SIGNED_OUT') {
                    state.user = null;
                    showScreen('login');
                }
            });
        }

        window.handleLogout = async function () {
            if (!confirm('¿Seguro que quieres cerrar sesión?')) return;
            const client = getSupabase();
            if (client) await client.auth.signOut();
            state.user = null;
            // No recargamos para permitir que onAuthStateChange maneje la UI
        };

        window.resetTotalApp = async function () {
            if (!confirm('¡¡ALERTA!! Esto borrará todos los Alumnos, Cursos y Asistencias permanentemente.\nSe usará para dejar la app "de fábrica". ¿Confirmar Borrado Total?')) return;
            const client = getSupabase();
            if (!client) return;
            try {
                // 1. Borrar asistencias
                const { error: e1 } = await client.from('asistencias').delete().neq('id', '00000000-0000-0000-0000-000000000000');
                if (e1) console.error('Error e1:', e1);

                // 2. Borrar alumnos (con filtro neq para asegurar borrado masivo)
                const { error: e2 } = await client.from('alumnos').delete().neq('id', '00000000-0000-0000-0000-000000000000');
                if (e2) console.error('Error e2:', e2);

                // 3. Borrar cursos
                const { error: e3 } = await client.from('cursos').delete().neq('id', '00000000-0000-0000-0000-000000000000');
                if (e3) {
                    // Si falla el neq en cursos, probamos por ID select
                    const { data: curData } = await client.from('cursos').select('id');
                    if (curData && curData.length > 0) {
                        await client.from('cursos').delete().in('id', curData.map(c => c.id));
                    }
                }

                alert('¡Sistema reseteado! Todo quedó en blanco.');
                location.reload();
            } catch (err) {
                console.error(err);
                alert('No se pudo completar el reinicio total: ' + err.message);
            }
        };

        function initSettings() {
            const emailEl = document.getElementById('settings-user-email');
            if (emailEl && state.user) {
                emailEl.textContent = state.user.email;

        // --- MODAL AÑADIR ALUMNO MANUAL ---
        window.openAddStudentModal = function () {
            const modal = document.getElementById('add-student-modal');

                select.innerHTML = '<option value="">Seleccione un Curso</option>' +

            } else {
                select.innerHTML = '<option value="">Cargando cursos...</option>';
                // Intentar recargar cursos si no hay
                const client = getSupabase();

                    client.from('cursos').select('*').order('nombre').then(({ data }) => {
                        if (data) {
                            state.courses = data;
                            select.innerHTML = '<option value="">Seleccione un Curso</option>' +
                                data.map(c => `<option value="${c.id}">${c.nombre} ${c.seccion || ''} ${c.ciclo ? '(' + c.ciclo + ')' : ''}</option>`).join('');

                    });
                }
            }
            // Pre-seleccionar el curso actual si estamos en asistencia
            const currentCourse = document.getElementById('course-select')?.value;

                select.value = currentCourse;

            modal.classList.remove('hidden');

        window.closeAddStudentModal = function () {
            document.getElementById('add-student-modal').classList.add('hidden');

        window.handleAddStudent = async function (e) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.textContent = "Guardando...";
            btn.disabled = true;

            const client = getSupabase();
            if (!client) return;

            const cursoId = document.getElementById('new-student-course').value;
            const nombre = document.getElementById('new-student-name').value.trim();
            const apellido = document.getElementById('new-student-last').value.trim() || "...";
            let documento = document.getElementById('new-student-doc').value.trim();

            if (!documento || /[a-zA-Z]/.test(documento)) documento = null;

                id_curso: cursoId,
                nombre: nombre,
                apellido: apellido,
                documento: documento
            };

            try {
                const { error } = await client.from('alumnos').insert([alumnData]);

                    if (error.code === '23505') { // Unique violation
                        alert('Error: Ya existe un alumno con ese documento.');
                    } else {
                        throw error;
                    }
                } else {
                    alert('✅ Alumno guardado correctamente.');

                    // Si estamos en la vista de asistencia y para el mismo curso, recargar la lista

        // --- LÓGICA DE PANTALLAS ---
        async function initDashboard() {
            const dateTextEl = document.getElementById('current-date-text');
            const filterInput = document.getElementById('dashboard-filter-date');

            if (!filterInput.value) filterInput.value = new Date().toISOString().split('T')[0];
            const activeDate = filterInput.value;

            if (dateTextEl) dateTextEl.textContent = new Date(activeDate + 'T12:00:00').toLocaleDateString('es-PY');

            // Cargar datos reales para el Dashboard
            const client = getSupabase();
            if (!client) return;

            // 1. Obtener todos los cursos
            const { data: cursos } = await client.from('cursos').select('*').order('nombre');
            if (!cursos) return;
            state.courses = cursos;

            // Llenar el select de cursos del dashboard
            const courseSelect = document.getElementById('dashboard-filter-course');
            if (courseSelect && courseSelect.options.length <= 1) {
                courseSelect.innerHTML = '<option value="">Todos los Cursos</option>' +
                    cursos.map(c => `<option value="${c.id}">${c.nombre} ${c.seccion || ''} ${c.ciclo ? '(' + c.ciclo + ')' : ''}</option>`).join('');
                courseSelect.onchange = () => initDashboard();
            }
            const selectedCourseId = courseSelect?.value;

            // 2. Obtener asistencias de la fecha filtrada
            let { data: asisHoy, error: errAsis } = await client.from('asistencias').select('*, alumnos(*)').eq('fecha', activeDate);
            if (errAsis && errAsis.code === '42703') {
                // Posible error de columna "turno" faltante, fallback suave
                alert("Atención: Por favor actualiza la base de datos Supabase con la columna 'turno' como indica la guía para evitar problemas.");
            }
            asisHoy = asisHoy || [];

            // Filtrar asistencias si hay un turno seleccionado diferente a 'Ambos'
            const turnoSelect = document.getElementById('dashboard-filter-turno');
            if (turnoSelect) {
                turnoSelect.onchange = () => initDashboard();
                const selectedTurno = turnoSelect.value;
                if (selectedTurno !== 'Ambos') {
                    // Si un registro antiguo no tiene turno, se asume 'Regular'
                    asisHoy = asisHoy.filter(a => (a.turno || 'Regular') === selectedTurno);
                }
            }

            // Filtrar asistencias si hay un curso seleccionado
            if (selectedCourseId) {
                asisHoy = asisHoy.filter(a => a.alumnos?.id_curso === selectedCourseId);
            }
            state.dashboardAsis = asisHoy;

            // 3. Obtener total de alumnos por curso para el %
            const { data: totalAlums } = await client.from('alumnos').select('id, id_curso');

            // Procesar datos para el gráfico
            const labels = [];
            const dataP = [];
            const dataA = [];
            const dataJ = [];

            let totalPresentesGlobal = 0;
            let totalAusentesGlobal = 0;
            let totalJustificadosGlobal = 0;

            // Filtrar alumnos totales si hay un curso seleccionado
            let alumsPoblacion = totalAlums || [];
            if (selectedCourseId) {
                alumsPoblacion = alumsPoblacion.filter(a => a.id_curso === selectedCourseId);
            }
            let totalAlumnosGlobal = alumsPoblacion.length;
            let cursosConAsistencia = 0;

            cursos.forEach(curso => {
                if (selectedCourseId && curso.id !== selectedCourseId) return;

                const alumsEnCurso = alumsPoblacion.filter(a => a.id_curso === curso.id).length;
                if (alumsEnCurso === 0) return;

                labels.push(curso.nombre);

                const asisCurso = state.dashboardAsis.filter(a => a.alumnos?.id_curso === curso.id);
                const p = asisCurso.filter(a => a.estado === 'P').length;
                const a = asisCurso.filter(a => a.estado === 'A').length;
                const j = asisCurso.filter(a => a.estado === 'J').length;

                if (asisCurso.length > 0) cursosConAsistencia++;
                totalPresentesGlobal += p;
                totalAusentesGlobal += a;
                totalJustificadosGlobal += j;

                dataP.push(p);
                dataA.push(a);
                dataJ.push(j);
            });

            // Actualizar KPIs
            const pctHoy = totalAlumnosGlobal > 0 ? Math.round((totalPresentesGlobal / totalAlumnosGlobal) * 100) : 0;
            document.getElementById('stat-today-pct').textContent = pctHoy + '%';
            document.getElementById('stat-courses-done').textContent = `${cursosConAsistencia}/${cursos.length}`;

            // Actualizar Conteos en las Nubecitas (Tags)
            document.getElementById('count-absent').textContent = totalAusentesGlobal;
            document.getElementById('count-justified').textContent = totalJustificadosGlobal;

            // Al cambiar la fecha, refrescar dashboard
            filterInput.onchange = () => initDashboard();

            renderRealChart(labels, dataP, dataA, dataJ);
        }

        function toggleDashboardList(status) {
            const listContainer = document.getElementById('dashboard-student-list');
            const tagA = document.getElementById('tag-absent');
            const tagJ = document.getElementById('tag-justified');

            // Si ya está activo ese filtro y hacemos clic de nuevo, lo cerramos
            const isTargetActive = (status === 'A' && tagA.classList.contains('active')) || (status === 'J' && tagJ.classList.contains('active'));

            tagA.classList.remove('active');
            tagJ.classList.remove('active');
            listContainer.classList.add('hidden');

            if (isTargetActive) return;

            // Activar nuevo filtro
            if (status === 'A') tagA.classList.add('active');
            else tagJ.classList.add('active');

            const filteredStudents = state.dashboardAsis.filter(a => a.estado === status);

            if (filteredStudents.length === 0) {
                listContainer.innerHTML = `<div style="text-align:center; padding: 20px; opacity:0.6;">No hay alumnos en esta categoría para esta fecha.</div>`;
            } else {
                listContainer.innerHTML = filteredStudents.map(asis => {
                    const alu = asis.alumnos;
                    const curso = state.courses.find(c => c.id === alu.id_curso);
                    const nombreLimpio = alu.apellido === '...' ? alu.nombre : `${alu.apellido}, ${alu.nombre}`;
                    return `
                        <div class="dashboard-student-row">
                            <div style="display:flex; flex-direction:column;">
                                <span style="font-weight:700;">${nombreLimpio}</span>
                                <span style="font-size:12px; color:var(--text-muted);">${alu.documento || 'Sin documento'}</span>
                            </div>
                            <span class="course-badge">${curso ? curso.nombre : 'S/C'}</span>
                        </div>
                    `;
                }).join('');
            }
            listContainer.classList.remove('hidden');
        }

        function renderRealChart(labels, p, a, j) {
            const canvas = document.getElementById('attendance-chart');
            if (!canvas || typeof Chart === 'undefined') return;

            if (window.myChart) window.myChart.destroy();

            const ctx = canvas.getContext('2d');
            window.myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels.length > 0 ? labels : ['Sin datos'],
                    datasets: [
                        { label: 'Presentes', data: p, backgroundColor: '#10b981', borderRadius: 12, hoverBackgroundColor: '#059669', barThickness: 24 },
                        { label: 'Ausentes', data: a, backgroundColor: '#ef4444', borderRadius: 12, hoverBackgroundColor: '#dc2626', barThickness: 24 },

        async function initAttendance() {
            const turnoInput = document.getElementById('turno-select');
            if (turnoInput) {
                turnoInput.value = state.attendanceTurno;
                turnoInput.addEventListener('change', async (e) => {
                    state.attendanceTurno = e.target.value;
                    const courseId = document.getElementById('course-select').value;
                    if (courseId) await loadStudents(courseId);
                });
            }

            const dateInput = document.getElementById('attendance-date');
            if (dateInput) {
                dateInput.value = state.attendanceDate;
                dateInput.addEventListener('change', async (e) => {
                    state.attendanceDate = e.target.value;
                    const courseId = document.getElementById('course-select').value;
                    if (courseId) await loadStudents(courseId);
                });
            }
            await loadCourses();
            document.getElementById('course-select')?.addEventListener('change', async (e) => {
                const courseId = e.target.value;
                if (courseId) await loadStudents(courseId);
            });
            document.getElementById('save-attendance')?.addEventListener('click', saveAndCopySummary);
        }

        async function loadCourses() {
            const client = getSupabase();
            if (!client) return;
            const { data, error } = await client.from('cursos').select('*').order('nombre');
            if (error) return console.error(error);
            state.courses = data;
            const select = document.getElementById('course-select');
            if (select) {
                select.innerHTML = '<option value="">Seleccionar Curso</option>' +
                    data.map(c => `<option value="${c.id}">${c.nombre} ${c.seccion || ''} ${c.ciclo ? '(' + c.ciclo + ')' : ''}</option>`).join('');
            }
        }

        async function loadStudents(courseId) {
            const client = getSupabase();
            if (!client) return;

            const container = document.getElementById('students-list');
            const actions = document.getElementById('attendance-actions');

            try {
                if (container) container.innerHTML = '<div class="glass-card" style="text-align:center; padding: 2rem;">⌛ Cargando lista de alumnos...</div>';
                if (actions) actions.classList.add('hidden');

                // 1. Cargar Alumnos
                const { data: students, error: sErr } = await client
                    .from('alumnos')
                    .select('*')
                    .eq('id_curso', courseId)
                    .order('apellido');

                if (sErr) throw sErr;
                state.students = students || [];

                // 2. Cargar Asistencia (Solo si hay alumnos)
                state.attendance = {};
                if (state.students.length > 0) {
                    // Try to load with turno if it exists, fallback to regular if error 42703 (column not exist) happens
                    let { data: attendance, error: aErr } = await client
                        .from('asistencias')
                        .select('*')
                        .eq('fecha', state.attendanceDate)
                        .in('alumno_id', state.students.map(s => s.id));

                    if (aErr) {
                        console.warn('Error cargando asistencia (¿Falta columna turno?):', aErr);
                        if (aErr.code === '42703') {
                            // No detener el proceso si falta la columna turno, solo recargar sin filtrar por turno localmente,
                            // o mostrar alerta sugerente para arreglar BD. Todo el error recae en no tener el turno.
                            alert('⚠️ Falta la configuración de "Turnos Opuestos" en Supabase. Revisa la Guia_Supabase.md y actualiza la tabla de asistencias.');
                        }
                    }

                    if (attendance) {
                        // Filtrar por turno del estado actual. Si en BD no hay turno (datos viejos), asumir 'Regular'
                        attendance = attendance.filter(r => (r.turno || 'Regular') === state.attendanceTurno);

                        attendance.forEach(record => {
                            state.attendance[record.alumno_id] = record.estado;
                        });
                    }
                }

                renderStudentsList();
            } catch (err) {
                console.error('Error en loadStudents:', err);
                if (container) {
                    container.innerHTML = `
                        <div class="glass-card" style="text-align:center; padding: 2rem; color: var(--error);">
                            <p>❌ Error al cargar alumnos:</p>
                            <small>${err.message || 'Sin respuesta de la base de datos'}</small>
                            <br><br>
                            <button class="btn-secondary" onclick="location.reload()">Reintentar</button>
                        </div>`;
                }
            }
        }

        function renderStudentsList() {
            const container = document.getElementById('students-list');
            const actions = document.getElementById('attendance-actions');
            if (!container) return;

            if (state.students.length === 0) {
                container.innerHTML = '<div class="glass-card" style="text-align:center; padding: 2rem;">📭 No hay alumnos registrados en este curso.</div>';
                if (actions) actions.classList.add('hidden');
                return;
            }

            container.innerHTML = state.students.map(s => {
                const displayName = (s.apellido && s.apellido !== '...' && s.apellido !== s.nombre)
                    ? `${s.apellido}, ${s.nombre}`
                    : s.nombre;

                const displayDoc = (s.documento && s.documento.toUpperCase() !== s.nombre.toUpperCase() && !/[a-zA-Z]/.test(s.documento))
                    ? s.documento
                    : '';

                return `
                <div class="glass-card student-row">
                    <div class="student-info" onclick="showStudentReport('${s.id}')">
                        <div class="student-name" style="text-transform: uppercase;">${displayName}</div>
                        <div class="student-docs">${displayDoc} <span style="font-size:0.7rem; color:var(--primary)">📈 Ver Reporte</span></div>
                    </div>
                    <div class="attendance-btns" data-student-id="${s.id}">
                        <button class="btn-att present ${state.attendance[s.id] === 'P' ? 'active' : ''}" onclick="markAttendance('${s.id}', 'P')">P</button>
                        <button class="btn-att absent ${state.attendance[s.id] === 'A' ? 'active' : ''}" onclick="markAttendance('${s.id}', 'A')">A</button>
                        <button class="btn-att justified ${state.attendance[s.id] === 'J' ? 'active' : ''}" onclick="markAttendance('${s.id}', 'J')">J</button>
                    </div>
                </div>
            `;
            }).join('');
            if (actions) actions.classList.remove('hidden');
        }

        window.markAttendance = (studentId, status) => {
            state.attendance[studentId] = status;
            renderStudentsList();
        };

        window.closeModal = () => {
            document.getElementById('student-modal').classList.add('hidden');
        };

        window.showStudentReport = async (studentId) => {
            const student = state.students.find(s => s.id === studentId);
            if (!student) return;

            const modal = document.getElementById('student-modal');
            const nameEl = document.getElementById('modal-student-name');
            const bodyEl = document.getElementById('modal-history-list');
            const statP = document.getElementById('modal-stat-p');
            const statA = document.getElementById('modal-stat-a');
            const statJ = document.getElementById('modal-stat-j');

            nameEl.textContent = `${student.apellido}, ${student.nombre}`;
            bodyEl.innerHTML = '<p style="text-align:center">⌛ Cargando historial...</p>';
            modal.classList.remove('hidden');

            const client = getSupabase();
            const { data, error } = await client
                .from('asistencias')
                .select('fecha, estado')
                .eq('alumno_id', studentId)
                .order('fecha', { ascending: false });

            if (error) {
                bodyEl.innerHTML = '<p style="color:red">Error al cargar historial.</p>';
                return;
            }

            const pCount = data.filter(d => d.estado === 'P').length;
            const aCount = data.filter(d => d.estado === 'A').length;
            const jCount = data.filter(d => d.estado === 'J').length;
            statP.textContent = pCount;
            statA.textContent = aCount;
            statJ.textContent = jCount;

            bodyEl.innerHTML = data.length === 0
                ? '<div style="text-align:center; padding: 24px; color: var(--text-muted); font-size: 14px;">No hay registros históricos aún</div>'
                : data.map(d => {
                    const statusClass = `status-${d.estado.toLowerCase()}`;
                    const statusText = d.estado === 'P' ? 'Presente' : d.estado === 'A' ? 'Ausente' : 'Justificado';
                    return `
                    <div class="history-item">
                        <span>${new Date(d.fecha).toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit', year: 'numeric' })}</span>
                        <b class="${statusClass}">${statusText}</b>
                    </div>`;
                }).join('');

            // Configurar el selector de traslado de curso
            const transferSelect = document.getElementById('transfer-course-select');
            const btnTransfer = document.getElementById('btn-transfer-student');

            if (transferSelect && state.courses) {
                transferSelect.innerHTML = state.courses.map(c =>
                    `<option value="${c.id}" ${c.id === student.id_curso ? 'selected' : ''}>${c.nombre} ${c.seccion || ''}</option>`
                ).join('');

                // Evitar múltiples listeners
                btnTransfer.onclick = () => window.changeStudentCourse(studentId);
            }
        };

        // --- LÓGICA TRASLADAR ALUMNO ---
        window.changeStudentCourse = async (studentId) => {
            const student = state.students.find(s => s.id === studentId);
            const selectEl = document.getElementById('transfer-course-select');
            const nuevoCursoId = selectEl.value;
            const nuevoCursoNombre = selectEl.options[selectEl.selectedIndex].text;

            if (!student || !nuevoCursoId) return;

            if (student.id_curso === nuevoCursoId) {
                alert('El alumno ya pertenece a este curso.');
                return;
            }

            if (!confirm(`¿Estás seguro que deseas trasladar a ${student.nombre} al curso: ${nuevoCursoNombre}?`)) {
                return;
            }

            const btnTransfer = document.getElementById('btn-transfer-student');
            const originalText = btnTransfer.innerHTML;
            btnTransfer.innerHTML = '⌛ Trasladando...';
            btnTransfer.disabled = true;

            const client = getSupabase();
            try {
                const { error } = await client
                    .from('alumnos')
                    .update({ id_curso: nuevoCursoId })
                    .eq('id', studentId);

                if (error) throw error;

                alert('✅ Alumno trasladado exitosamente.');
                closeModal();

                // Si la vista actual es la asistencia y estamos viendo el curso viejo, recargamos la lista
                const currentCourseId = document.getElementById('course-select')?.value;
                if (state.currentScreen === 'attendance' && currentCourseId) {
                    await loadStudents(currentCourseId);
                } else if (state.currentScreen === 'dashboard') {
                    initDashboard(); // Refrescar kpis
                }

            } catch (err) {
                console.error(err);
                alert('❌ Error al trasladar: ' + err.message);
            } finally {
                btnTransfer.innerHTML = originalText;
                btnTransfer.disabled = false;
            }
        };

        async function saveAndCopySummary() {
            const courseId = document.getElementById('course-select').value;
            const course = state.courses.find(c => c.id === courseId);
            const date = document.getElementById('attendance-date').value;

            const attendanceRecords = Object.entries(state.attendance).map(([studentId, estado]) => ({
                alumno_id: studentId,
                fecha: date,
                estado: estado,
                turno: state.attendanceTurno
            }));

            if (attendanceRecords.length === 0) return alert('No hay datos para guardar.');

            const client = getSupabase();
            if (client) {
                // Upsert con restricción única compuesta (alumno_id, fecha, turno)
                const { error } = await client.from('asistencias').upsert(attendanceRecords, { onConflict: 'alumno_id,fecha,turno' });
                if (error) {
                    if (error.code === '42703' || error.message.includes('onConflict')) {
                        // Fallback en caso de que aún no hayan creado la clave primaria compuesta o falte la columna
                        const { error: err2 } = await client.from('asistencias').upsert(attendanceRecords, { onConflict: 'alumno_id,fecha' });
                        if (err2) return alert('Error al guardar (Configura las restricciones en Supabase): ' + err2.message);
                    } else {
                        return alert('Error al guardar: ' + error.message);
                    }
                }
            }

            const presentes = attendanceRecords.filter(r => r.estado === 'P').length;
            const ausentesRecords = attendanceRecords.filter(r => r.estado === 'A');
            const justificadosRecords = attendanceRecords.filter(r => r.estado === 'J');

            let ausentesTexto = " Ninguno";
            if (ausentesRecords.length > 0) {
                ausentesTexto = "";
                ausentesRecords.forEach(r => {
                    const alu = state.students.find(s => s.id === r.alumno_id);
                    const nombreLimpio = alu.apellido === '...' ? alu.nombre : `${alu.apellido}, ${alu.nombre}`;
                    ausentesTexto += `\r\n• ${nombreLimpio} ... Del ${course.nombre}`;
                });
            }

            let justificadosTexto = " Ninguno";
            if (justificadosRecords.length > 0) {
                justificadosTexto = "";
                justificadosRecords.forEach(r => {
                    const alu = state.students.find(s => s.id === r.alumno_id);
                    const nombreLimpio = alu.apellido === '...' ? alu.nombre : `${alu.apellido}, ${alu.nombre}`;
                    justificadosTexto += `\r\n• ${nombreLimpio} ... Del ${course.nombre}`;
                });
            }

            const turnoLabel = state.attendanceTurno === 'Opuesto' ? '🌙 Turno Opuesto' : '☀️ Turno Regular';
            const summary = `📋 RESUMEN DE ASISTENCIA\r\n📌 Curso: ${course.nombre}\r\n⏱️ Turno: ${turnoLabel}\r\n📅 Fecha: ${new Date(date).toLocaleDateString('es-PY')}\r\n\r\n✅ Presentes: ${presentes}\r\n\r\n❌ Hoy faltó:${ausentesTexto}\r\n\r\n📝 Justificados:${justificadosTexto}`;

            if (navigator.clipboard) {
                navigator.clipboard.writeText(summary).then(() => {
                    alert('¡Asistencia Guardada y Resumen Copiado! 🚀');
                    navigateTo('dashboard');
                });
            } else {
                alert('¡Guardado en base de datos! (No se pudo copiar al portapapeles)');
                navigateTo('dashboard');
            }
        }
