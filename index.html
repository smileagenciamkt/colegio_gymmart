        async function handleExcelImport(e) {
            var file = e.target.files[0];
            if (!file) return;

            var statusDiv = document.getElementById('import-status');
            statusDiv.innerHTML = '<p style="color:var(--primary)">⏳ Leyendo archivo...</p>';

            var reader = new FileReader();
            reader.onload = async (evt) => {
                try {
                    var data = evt.target.result;
                    var workbook = XLSX.read(data, { type: 'binary' });
                    var sheetName = workbook.SheetNames[0];
                    var json = XLSX.utils.sheet_to_json(workbook.Sheets[sheetName]);

                    if (json.length === 0) throw new Error('El archivo está vacío.');

                    var client = getSupabase();
                    if (!client) throw new Error('No hay conexión con Supabase.');

                    statusDiv.innerHTML = `<p>🚀 Procesando ${json.length} alumnos...</p>`;

                    for (var i = 0; i < json.length; i++) {
                        var row = json[i];

                        // Función de búsqueda flexible y ROBUSTA
                        // Función de búsqueda flexible y ROBUSTA (Corregido: Evitar que 'id' coincida con 'apellido')
                        var findVal = (names) => {
                            var keys = Object.keys(row);
                            var cleanedNames = names.map(n => n.toLowerCase().trim());

                            // 1. Coincidencia exacta (Prioridad Máxima)
                            var exactKey = keys.find(k => {
                                let ck = k.toLowerCase().trim();
                                return cleanedNames.includes(ck);
                            });
                            if (exactKey) return row[exactKey];

                            // 2. Coincidencia parcial suave (Evitar 'id' en 'apellido')
                            var fuzzyKey = keys.find(k => {
                                let ck = k.toLowerCase().trim();
                                // Si buscamos 'id', no queremos que coincida con 'apellido'
                                if (cleanedNames.includes('id') && ck.includes('apellido')) return false;
                                return cleanedNames.some(n => ck.includes(n));
                            });
                            return fuzzyKey ? row[fuzzyKey] : null;
                        };

                        // 1. Identificar Curso (Si no hay columna, usamos el nombre del archivo)
                        var cursoNombre = findVal(['curso', 'clase']) || file.name.replace(/\.[^/.]+$/, "").toUpperCase();

                        // 2. Grado (Escala 1-3 para Científico/Técnico para cumplir con restricciones 1-9 usuales)
                        var gradoNum = 1;
                        var gLower = cursoNombre.toLowerCase();
                        if (gLower.includes('primer') || gLower.includes('1')) gradoNum = 1;
                        else if (gLower.includes('segund') || gLower.includes('2')) gradoNum = 2;
                        else if (gLower.includes('tercer') || gLower.includes('3')) gradoNum = 3;

                        // 3. Nombres y Apellidos (Mapeo exacto: "NOMBRE Y APELLIDO")
                        var nombreCompleto = findVal(['nombre y apellido', 'alumno', 'estudiante']) || "";
                        var nombre = findVal(['nombre', 'nombres']) || "";
                        var apellido = findVal(['apellido', 'apellidos']) || "";

                        // Si el nombre contiene una coma y el apellido está vacío, separamos (Formato: Apellido, Nombre)
                        if (nombre.includes(',') && !apellido) {
                            var p = nombre.split(',');
                            apellido = p[0].trim();
                            nombre = p[1].trim();
                        }

                        // Si viene en columna específica de nombre completo
                        if (nombreCompleto && (!nombre || !apellido || apellido === '...')) {
                            if (nombreCompleto.includes(',')) {
                                var parts = nombreCompleto.split(',');
                                apellido = parts[0].trim();
                                nombre = parts[1].trim();
                            } else {
                                var parts = nombreCompleto.trim().split(/\s+/);
                                if (parts.length >= 2) {
                                    apellido = parts[0];
                                    nombre = parts.slice(1).join(' ');
                                } else {
                                    nombre = nombreCompleto;
                                    apellido = "...";
                                }
                            }
                        }

                        var documento = String(findVal(['documento', 'ci', 'c.i', 'cedula']) || '');
                        // Quitamos 'id' de la búsqueda automática de documento para evitar falsos positivos con 'apellido'
                        if (!documento) documento = String(findVal(['nro']) || '');

                        var cicloVal = findVal(['ciclo', 'nivel']) || '';

                        // Limpiar nombres duplicados si el Excel trajo todo en una sola celda
                        if (nombre && apellido && nombre.toLowerCase() === apellido.toLowerCase()) apellido = "...";
                        if (documento && nombre && documento.trim() === nombre.trim()) documento = "";

                        // Si el documento tiene letras, probablemente sea un error de mapeo del Excel
                        // Si el documento tiene letras o es igual al nombre, lo vaciamos
                        if (/[a-zA-Z]/.test(documento) && documento.length > 3) documento = "";

                        // IMPORTANTE: Postgres UNIQUE permite múltiples NULL, pero NO múltiples "". 
                        // Cambiamos "" por null para que no choquen en la base de datos (evita que se pisen los alumnos sin CI).
                        var documentoFinal = (documento && documento.trim() !== "") ? documento.trim() : null;

                        statusDiv.innerHTML = `<p>⏳ (${i + 1}/${json.length}) Procesando: <b>${nombre}</b>...</p>`;

                        // 4. Asegurar Curso en Supabase
                        var { data: curso, error: cErr } = await client
                            .from('cursos')
                            .select('id')
                            .eq('nombre', cursoNombre)
                            .maybeSingle();

                        if (!curso) {
                            var seccionVal = 'A';
                            var parts = cursoNombre.trim().split(/\s+/);
                            var last = parts[parts.length - 1];
                            if (last.length === 1 && /[A-Z]/i.test(last)) seccionVal = last.toUpperCase();

                            // Intento de inserción con reintento por restricción de grado
                            var { data: newC, error: iErr } = await client
                                .from('cursos')
                                .insert([{ nombre: cursoNombre, grado: gradoNum, seccion: seccionVal, turno: 'Mañana', ciclo: cicloVal }])
                                .select().single();

                            if (iErr) {
                                // Reintento con grado 1 si el grado detectado falla por restricción
                                var { data: retryC, error: rErr } = await client
                                    .from('cursos')
                                    .insert([{ nombre: cursoNombre, grado: 1, seccion: seccionVal, turno: 'Mañana', ciclo: cicloVal }])
                                    .select().single();
                                if (!rErr) curso = retryC;
                                else throw new Error(`Error en curso ${cursoNombre}: ${iErr.message}`);
                            } else {
                                curso = newC;
                            }
                        }

                        // 5. Insertar o traer alumno
                        const alumData = {
                            id_curso: curso.id,
                            nombre: nombre,
                            apellido: apellido,
                            documento: documentoFinal
                        };

                        var { data: alum, error: aErr } = await client
                            .from('alumnos')
                            .upsert(alumData, { onConflict: documentoFinal ? 'documento' : 'id' })
                            // Si no hay documento, upsert a 'id' (como no hay id, siempre inserta)
                            .select('id')
                            .single();
                    }

                    statusDiv.innerHTML = `<p style="color:var(--success)">✅ ¡ÉXITO! ${json.length} alumnos importados correctamente.</p>`;
                    alert('¡Importación Exitosa! 🎉');

                } catch (err) {
                    console.error(err);
                    statusDiv.innerHTML = `<p style="color:var(--error)">❌ Error: ${err.message}</p>`;
                    alert('Error en importación: ' + err.message);
                }
            };
            reader.readAsBinaryString(file);
        }

        // --- EXPORTAR A EXCEL ---
        window.exportAttendanceToExcel = async function () {
            const courseId = document.getElementById('course-select')?.value;
            if (!courseId) {
                alert('⚠️ Por favor, selecciona un curso primero para exportar su asistencia.');
                return;
            }

            const course = state.courses.find(c => c.id === courseId);
            const turnoSelected = document.getElementById('turno-select')?.value || 'Regular';

            const option = prompt('¿Qué datos deseas exportar?\n1: Solo ' + turnoSelected + ' \n2: Ambos Turnos (Regular y Opuesto)', '1');
            if (option !== '1' && option !== '2') return;

            const client = getSupabase();
            if (!client) return alert("No hay conexión.");

            // Mostrar un indicador de carga (opcional)
            const btn = document.querySelector('button[onclick="window.exportAttendanceToExcel()"]');
            const originalText = btn.innerHTML;
            btn.innerHTML = '⌛ Generando Excel...';
            btn.disabled = true;

            try {
                // 1. Traer todos los alumnos del curso
                const { data: alums, error: errAlums } = await client.from('alumnos').select('*').eq('id_curso', courseId).order('apellido');
                if (errAlums || !alums || alums.length === 0) {
                    throw new Error("No se encontraron alumnos para este curso.");
                }

                // 2. Traer todas las asistencias de este curso (usando "in" con los IDs de alumnos)
                const alumIds = alums.map(a => a.id);
                // Para no saturar si hay cientos de alumnos, los traemos en un array si son < 1000. Supabase soporta filtros '.in'
                const { data: asistencias, error: errAsis } = await client
                    .from('asistencias')
                    .select('fecha, estado, turno, alumno_id')
                    .in('alumno_id', alumIds)
                    .order('fecha', { ascending: true });

                if (errAsis) throw new Error("Error cargando historial: " + errAsis.message);

                let filteredAsis = asistencias || [];
                // Aplicar homogeneización de turnos nulos heredados a 'Regular'
                filteredAsis.forEach(a => { if (!a.turno) a.turno = 'Regular'; });

                if (option === '1') {
                    filteredAsis = filteredAsis.filter(a => a.turno === turnoSelected);
                }

                // 3. Identificar todas las fechas únicas que existen en estos datos
                const uniqueDatesSet = new Set();
                filteredAsis.forEach(a => uniqueDatesSet.add(a.fecha));
                const sortedDates = Array.from(uniqueDatesSet).sort();

                // 4. Preparar la estructura de filas para Excel
                const excelData = [];

                alums.forEach(alumno => {
                    const row = {};
                    row['Documento'] = alumno.documento || '';

                    const fullName = (alumno.apellido && alumno.apellido !== '...')
                        ? `${alumno.apellido}, ${alumno.nombre}`
                        : alumno.nombre;

                    row['Nombre Completo'] = fullName;

                    let totalP = 0, totalA = 0, totalJ = 0;
                    let totalClases = 0;

                    // Llenar día por día
                    sortedDates.forEach(date => {
                        const dateLabel = new Date(date + 'T12:00:00').toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit' });

                        if (option === '2') {
                            // Turno Regular
                            const arrReg = filteredAsis.find(a => a.alumno_id === alumno.id && a.fecha === date && a.turno === 'Regular');
                            const valReg = arrReg ? arrReg.estado : '-';
                            row[`${dateLabel} (Reg)`] = valReg;
                            if (valReg !== '-') totalClases++;
                            if (valReg === 'P') totalP++;
                            if (valReg === 'A') totalA++;
                            if (valReg === 'J') totalJ++;

                            // Turno Opuesto
                            const arrOpu = filteredAsis.find(a => a.alumno_id === alumno.id && a.fecha === date && a.turno === 'Opuesto');
                            const valOpu = arrOpu ? arrOpu.estado : '-';
                            row[`${dateLabel} (Opu)`] = valOpu;
                            if (valOpu !== '-') totalClases++;
                            if (valOpu === 'P') totalP++;
                            if (valOpu === 'A') totalA++;
                            if (valOpu === 'J') totalJ++;
                        } else {
                            // Solo el turno seleccionado
                            const arr = filteredAsis.find(a => a.alumno_id === alumno.id && a.fecha === date && a.turno === turnoSelected);
                            const val = arr ? arr.estado : '-';
                            row[`${dateLabel}`] = val;

                            if (val !== '-') totalClases++;
                            if (val === 'P') totalP++;
                            if (val === 'A') totalA++;
                            if (val === 'J') totalJ++;
                        }
                    });

                    // Calcular Resúmenes Finales
                    row['Total Presente (P)'] = totalP;
                    row['Total Ausente (A)'] = totalA;
                    row['Total Justif (J)'] = totalJ;

                    // Solo calculamos porcentaje sobre las clases en las que se le tomó lista a ESTE alumno.
                    const porcentaje = totalClases > 0 ? Math.round((totalP / totalClases) * 100) : 0;
                    row['% Presentismo'] = `${porcentaje}%`;

                    excelData.push(row);
                });

                // 5. Crear el libro de Excel con SheetJS
                const worksheet = XLSX.utils.json_to_sheet(excelData);
                const workbook = XLSX.utils.book_new();

                // Darle ancho a las columnas automáticamente
                worksheet['!cols'] = [
                    { wch: 12 }, // Documento
                    { wch: 20 }, // Apellido
                    { wch: 20 }  // Nombre
                ];

                const sheetName = (course.nombre + (course.seccion ? ' ' + course.seccion : '')).substring(0, 31); // Max 31 chars
                XLSX.utils.book_append_sheet(workbook, worksheet, sheetName);

                // 6. Descargar el archivo
                const turnoStr = option === '2' ? 'Ambos_Turnos' : turnoSelected;
                const fileName = `Reporte_Asistencia_${course.nombre.replace(/\s+/g, '_')}_${turnoStr}.xlsx`;
                XLSX.writeFile(workbook, fileName);

            } catch (err) {
                console.error(err);
                alert("❌ Error al exportar a Excel: " + err.message);
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        };

        // --- INICIALIZACIÓN ---
        document.addEventListener('DOMContentLoaded', async () => {
            // Primero verificamos si hay sesión activa
            await checkSession();

            // Ojo de contraseña
            const toggleBtn = document.getElementById('toggle-password');
            const passwordInput = document.getElementById('password');
            if (toggleBtn && passwordInput) {
                toggleBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    const isPass = passwordInput.type === 'password';
                    passwordInput.type = isPass ? 'text' : 'password';
                    toggleBtn.textContent = isPass ? '🙈' : '👁️';
                });
            }

            // Manejo del formulario de login
            const loginForm = document.getElementById('login-form');
            if (loginForm) {
                loginForm.addEventListener('submit', function (e) {
                    e.preventDefault();
                    console.log('Intento de Login...');
                    if (window.handleLoginSubmit) {
                        window.handleLoginSubmit(e);
                    } else {
                        alert('❌ ERROR CRÍTICO: La función de login no está disponible.');
                    }
                });
            }

            // Navegación Bottom
            document.querySelectorAll('.nav-item').forEach(item => {
                item.addEventListener('click', () => navigateTo(item.dataset.screen));
            });

            // 🚀 REGISTRO DE SERVICE WORKER (NIVEL PRO)
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker Registrado Pro ✅', reg))
                    .catch(err => console.log('Error SW ❌', err));
            }
        });
    </script>
</body>
